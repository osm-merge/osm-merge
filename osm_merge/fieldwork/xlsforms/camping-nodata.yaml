survey:
- '#': Converted by yxf, from camping-nodata.xlsx. Edit the YAML file instead of the
    Excel file.
- type: today
  name: today
- type: deviceid
  name: deviceid
- type: username
  name: username
- type: start-geopoint
  name: warmup
- type: start
  name: start
- type: begin_group
  name: all
  label::English: Everything
  appearance: field-list
- type: select_one model
  name: model
  label::English: Data Model Level
  appearance: minimal
  default: ${last-saved#model}
- type: select_one tourism
  name: camptype
  label::English: What type of camping is available ?
  hint::English: Is this a camp ground POI or an individual campsite ?
  appearance: minimal
  default: camp_pitch
  required: yes
- type: begin_group
  name: campsite
  label::English: Individual campsite
  appearance: minimal
  relevant: ${camptype}=”camp_pitch”
- type: integer
  name: ref
  label::English: Does this camp site have a reference number ?
  appearance: minimal
- type: select_multiple features
  name: features
  label::English: What features does this campsite have ?
  hint::English: Multi selection test
  appearance: minimal
  default: ${last-saved#features}
  required: yes
- type: end_group
  name: campsite
- type: begin_group
  name: campground
  label::English: Official Campground
  appearance: field-list
  relevant: ${camptype}=”camp_site”
- type: text
  name: name
  label::English: Campground name
  appearance: minimal
  required: yes
- type: select_one yes_no
  name: toilet
  label::English: Does this campground have a toilet ?
  appearance: minimal
  default: ${last-saved#toilet}
- type: select_one yes_no
  name: showers
  label::English: Are there showers available ?
  appearance: minimal
  default: ${last-saved#showers}
- type: select_one yes_no
  name: fee
  label::English: Is there a fee ?
  appearance: minimal
  default: ${last-saved#fee}
- type: select_one yes_no
  name: internet_access
  label::English: Is there a working cell connection ?
  appearance: minimal
  default: ${last-saved#internet_access}
- type: select_one yes_no
  name: drinking_water
  label::English: Does this campground have drinking water available ?
  appearance: minimal
  relevant: ${model}='extended'
  default: ${last-saved#drinking_water}
- type: text
  name: cost
  label::English: How much does this campground cost in USD ?
  appearance: minimal
  relevant: "${model}='extended' and ${fee} = 'yes' "
- type: select_one amenity
  name: amenity
  label::English: What type of building or amenity is this ?
  hint::English: Multi selection test
  appearance: minimal
  relevant: ${model}='extended'
  default: ${last-saved#amenity}
  required: yes
- type: select_one yes_no
  name: group_only
  label::English: Is this campground only for groups ?
  appearance: minimal
  relevant: ${model}='extended'
  default: ${last-saved#group_only}
- type: end_group
  name: end of campground
- type: geopoint
  name: location
  label::English: Please record a GPS point at the feature location.
  appearance: placement-map
  parameters: allow-mock-accuracy=true
  required: yes
- type: image
  name: image
  label::English: Take A Picture
  appearance: minimal
  relevant: ${model}='extended'
  parameters: max-pixels=1000
- type: text
  name: comment
  label::English: Any other comments about this feature ?
  appearance: minimal
- type: end_group
  name: end of all
