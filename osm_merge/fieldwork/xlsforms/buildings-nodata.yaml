survey:
- '#': Converted by yxf, from buildings-nodata.xlsx. Edit the YAML file instead of
    the Excel file.
- type: start
  name: start
- type: end
  name: end
- type: today
  name: today
- type: deviceid
  name: deviceid
- type: start-geopoint
  name: warmup
- type: begin group
  name: all
  label::English(en): Building Details
  appearance: field-list
- type: start
  name: start
- type: select_one model
  name: model
  label::English(en): Data Model Level
  appearance: minimal
  calculation: basic
  default: ${last-saved#model}
- type: begin_group
  name: buildings
  label::English(en): Building Types
  appearance: field-list
- type: select_one category
  name: category
  label::English(en): What type of Building is this ?
  appearance: minimal
  required: yes
- type: text
  name: name
  label::English(en): What is the name if there is one ?
  appearance: minimal
  relevant: ${category}!=’’
- type: select_one building:material
  name: building_material
  label::English(en): What are the walls made of ?
  appearance: minimal
  relevant: ${category}!=’’ and ${model}=’extended'
- type: integer
  name: building_levels
  label::English(en): How many levels are in the building ?
  appearance: minimal
  relevant: ${category}!=’’ and ${model}=’extended'
- type: select_one yes_no
  name: convenience
  label::English(en): Does this gas station also sell things ?
  appearance: minimal
  relevant: ${category}=’fuel’
  default: ${last-saved#convenience}
- type: select_one yes_no
  name: diesel
  label::English(en): Is there diesel fuel available ?
  appearance: minimal
  relevant: ${category}=’fuel’
  default: ${last-saved#diesel}
- type: select_one yes_no
  name: fast_food
  label::English(en): Is there food available ?
  appearance: minimal
  relevant: ${category}=’fuel’
  default: ${last-saved#fast_food}
- type: select_one religion
  name: religion
  label::English(en): What religion is practiced here ?
  appearance: minimal
  relevant: ${category}=’religious’
  default: ${last-saved#religion}
  required: yes
- type: select_one denomination
  name: denomination
  label::English(en): What is the denomination ?
  appearance: minimal
  relevant: ${religion}=’christian’
  default: ${last-saved#denomination}
- type: select_one muslim
  name: muslim
  label::English(en): What is the Muslim Sect ?
  appearance: minimal
  relevant: ${religion}=’muslim’
- type: select_one hindu
  name: hindu
  label::English(en): What is the Hindu Sect ?
  appearance: minimal
  relevant: ${religion}=’hindu’
- type: select_one religious
  name: religious
  label::English(en): What type of religious building is this ?
  appearance: minimal
  relevant: ${category}=’religious’
- type: select_one service
  name: service
  label::English(en): What type of services are available here ?
  appearance: minimal
  relevant: ${category}=’service’
  default: ${last-saved#service}
  required: yes
- type: select_one shop
  name: shop
  label::English(en): What type of retail shop is this ?
  appearance: minimal
  relevant: ${category}=’retail’
  default: ${last-saved#shop}
  required: yes
- type: select_one tourism
  name: tourism
  label::English(en): What type of tourist building is this ?
  appearance: minimal
  relevant: ${category}=’tourism’
  choice_filter: category=${category}
  default: ${last-saved#tourism}
  required: yes
- type: select_one amenity
  name: education_details
  label::English(en): What type of educational building is this ?
  appearance: minimal
  relevant: ${category}=’education’
  choice_filter: category=${category}
  default: ${last-saved#education_details}
  required: yes
- type: note
  name: link
  label::English(en): For more details about schools, please use the education XForm
    instead.
  relevant: ${category}=’education’
- type: select_one amenity
  name: government
  label::English(en): What type of public building is this ?
  appearance: minimal
  relevant: ${category}=’government’
  choice_filter: category=${category}
  default: ${last-saved#government}
  required: yes
- type: select_one amenity
  name: medical
  label::English(en): What type of medical facility is this ?
  appearance: minimal
  relevant: ${category}=’medical’
  choice_filter: category=${category}
  default: ${last-saved#medical}
  required: yes
- type: select_multiple food
  name: food
  label::English(en): What type of food is available here ?
  appearance: minimal
  relevant: ${category}=’food’
  default: ${last-saved#food}
  required: yes
- type: select_one cuisine
  name: cuisine
  label::English(en): What type of cuisine is served here ?
  appearance: minimal
  relevant: ${category}=’food’
  default: ${last-saved#cuisine}
- type: select_one historic
  name: heritage
  label::English(en): What type of historical building is this ?
  appearance: minimal
  relevant: ${category}=’historic’
  choice_filter: category=${category}
  required: yes
- type: select_one amenity
  name: emergency
  label::English(en): What type of emergency services can you get here ?
  appearance: minimal
  relevant: ${category}=’emergency’
  choice_filter: category=${category}
- type: text
  name: operator
  label::English(en): What is the name of the operator ?
  appearance: minimal
  relevant: ${category}=’historic’ or ${housing}=’apartment'
  required: yes
- type: date
  name: inscription
  label::English(en): What is the data on the inscription ?
  appearance: minimal
  relevant: ${category}=’historic’ and ${model}=’extended'
- type: select_one housing
  name: housing
  label::English(en): What type of living space is here ?
  appearance: minimal
  relevant: ${category}=’housing’
  default: ${last-saved#housing}
- type: text
  name: provider
  label::English(en): What is the name of the operator ?
  appearance: minimal
  relevant: ${housing}!=’residential’ and ${category}=’housing'
- type: integer
  name: rooms
  label::English(en): How many rooms are available ?
  appearance: minimal
  relevant: ${housing}=’hotel’ or ${housing}=’hostel’  and ${model}=’extended'
- type: integer
  name: ref
  label::English(en): What is the reference number for this camp site ?
  appearance: minimal
  relevant: ${housing}=’camp_pitch’
- type: integer
  name: building_neighbor
  label::English(en): How many people are in the neighborhood ?
  appearance: minimal
  relevant: ${housing}=’residential’ and ${model}=’extended'
- type: end_group
  name: eof for buildings
- type: begin_group
  name: gps
  label::English(en): GPS Coordinates
  appearance: field-list
  required: yes
- type: geopoint
  name: point
  label::English(en): Please take a GPS point at the feature location.
  hint::English(en): Where are we ?
  appearance: Placement-map
  required: yes
- type: text
  name: comment
  label::English(en): Any other comments about this feature
  appearance: minimal
- type: image
  name: image
  label::English(en): Take A Picture
  appearance: minimal
  relevant: " ${model}=’extended'"
  parameters: max-pixels=1000
- type: begin_group
  name: details
  label::English(en): More Building Details
  appearance: field-list
  relevant: ${model}=’extended’
- type: select_one yes_no
  name: power
  label::English(en): Does this building have electricity ?
  appearance: minimal
  default: ${last-saved#power}
- type: select_one generator:source
  name: generator_source
  label::English(en): What is the primary power source ?
  appearance: minimal
  relevant: ${power}=’yes’
  default: ${last-saved#generator_source}
- type: select_one yes_no
  name: generator
  label::English(en): Does this building have a backup generator ?
  appearance: minimal
  relevant: (${category}=’medical’ or ${category}=’food') and  ${model}=’extended'
  default: ${last-saved#generator}
- type: select_one yes_no
  name: water
  label::English(en): Does this building have a water source ?
  appearance: minimal
  default: ${last-saved#water}
- type: integer
  name: age
  label::English(en): Age of building
  appearance: minimal
- type: select_one yes_no
  name: building_prefab
  label::English(en): Is this a prefabricated building ?
  appearance: minimal
- type: select_one building:floor
  name: building_floor
  label::English(en): What is the floor made of ?
  appearance: minimal
  default: ${last-saved#building_floor}
- type: select_one building:roof
  name: building_roof
  label::English(en): Is this building only a roof ?
  appearance: minimal
  default: ${last-saved#building_roof}
- type: select_one building:condition
  name: condition
  label::English(en): What is the building condition ?
  appearance: minimal
  default: ${last-saved#condition}
- type: select_one yes_no
  name: access_roof
  label::English(en): Is there access to the roof ?
  appearance: minimal
- type: text
  name: levels_underground
  label::English(en): How many levels are underground ?
  appearance: minimal
- type: end_group
  name: gps
- type: end_group
  name: eof for details
- type: end_group
  name: eof for all
